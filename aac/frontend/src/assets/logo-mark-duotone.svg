<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Lucid Voice mark, duotone">
  <title>Lucid Voice mark — duotone</title>
  <!-- Duotone: teal bars = the machine's offered candidates, coral center bar =
       the one word the human chooses and voices (the product's core beat). -->
  <circle cx="50" cy="50" r="46" fill="#FFFFFF" stroke="#D6DEE8" stroke-width="2"/>
  <rect x="22" y="38" width="8" height="24" rx="4" fill="#0C8276"/>
  <rect x="34" y="30" width="8" height="40" rx="4" fill="#0C8276"/>
  <rect x="46" y="22" width="8" height="56" rx="4" fill="#E14826"/>
  <rect x="58" y="30" width="8" height="40" rx="4" fill="#0C8276"/>
  <rect x="70" y="38" width="8" height="24" rx="4" fill="#0C8276"/>
</svg>
