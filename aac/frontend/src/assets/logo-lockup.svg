<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 132" role="img" aria-label="Lucid Voice">
  <title>Lucid Voice</title>
  <desc>The Lucid Voice voice-orb mark beside the wordmark: Lucid in Geist, Voice in Newsreader serif.</desc>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Geist:wght@600&amp;family=Geist+Mono:wght@500&amp;family=Newsreader:wght@500&amp;display=swap');
    .wm{font-family:'Geist',ui-sans-serif,system-ui,sans-serif;font-weight:600;}
    .wv{font-family:'Newsreader',ui-serif,Georgia,serif;font-weight:500;}
    .tag{font-family:'Geist Mono',ui-monospace,monospace;font-weight:500;letter-spacing:0.04em;}
  </style>
  <!-- Mark -->
  <circle cx="62" cy="66" r="46" fill="#E14826"/>
  <g fill="#FFFFFF">
    <rect x="34" y="54" width="8" height="24" rx="4"/>
    <rect x="46" y="46" width="8" height="40" rx="4"/>
    <rect x="58" y="38" width="8" height="56" rx="4"/>
    <rect x="70" y="46" width="8" height="40" rx="4"/>
    <rect x="82" y="54" width="8" height="24" rx="4"/>
  </g>
  <!-- Wordmark: "Lucid" (interface, Geist) + "Voice" (the human utterance, Newsreader serif) -->
  <text class="wm" x="134" y="80" font-size="46" fill="#161A21">Lucid</text>
  <text class="wv" x="270" y="80" font-size="46" fill="#E14826">Voice</text>
  <text class="tag" x="136" y="105" font-size="12" fill="#566273">YOUR WORDS · SPOKEN IN YOUR REGISTER</text>
</svg>
